<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sofía 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*{
    box-sizing: border-box;
    margin:0;
    padding:0;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background: url("fondo.jpg") center/cover no-repeat;
    background-color:#f4efe6;

    overflow-x:hidden;
    animation: fondoMovimiento 40s ease-in-out infinite alternate;
}

@keyframes fondoMovimiento{
    0%{ background-position: center top; }
    100%{ background-position: center bottom; }
}

/* 💌 tarjeta */
.card{
    width:100%;
    max-width:420px;
    padding:50px 35px;
    text-align:center;

    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    border-radius:14px;

    box-shadow: 0 20px 60px rgba(0,0,0,0.18);

    animation: aparecer 1.2s ease, flotar 12s ease-in-out infinite;
}

@keyframes aparecer{
    from{ opacity:0; transform: translateY(30px); }
    to{ opacity:1; transform: translateY(0); }
}

@keyframes flotar{
    0%{ transform: translateY(0px) rotate(0deg); }
    50%{ transform: translateY(-6px) rotate(0.3deg); }
    100%{ transform: translateY(0px) rotate(0deg); }
}

/* 🌸 divisores */
.divider{
    width:100%;
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.divider img{
    width:70%;
    max-width:220px;
    height:auto;
    opacity:0.85;
}

/* texto */
.text{
    font-family:'Playfair Display', serif;
    color:#2a1f1a;

    font-weight:500;
    letter-spacing:0.3px;
    line-height:1.9;

    animation: respirar 6s ease-in-out infinite;
}

@keyframes respirar{
    0%,100%{ opacity:0.95; }
    50%{ opacity:1; }
}

.text p{
    margin:26px 0;
    font-size:1.6rem;
    font-style:italic;
}

.nombre{
    font-size:2rem;
    margin-bottom:20px;
}

/* ❤️ corazón tinta */
.heart{
    display:inline-block;
    width:14px;
    height:14px;
    background:#7a2a2a;
    transform: rotate(45deg);
    margin-left:6px;
    opacity:0.85;
    position: relative;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:14px;
    height:14px;
    background:#7a2a2a;
    border-radius:50%;
}

.heart::before{ top:-7px; left:0; }
.heart::after{ left:-7px; top:0; }

/* responsive */
@media (min-width:768px){
    .text p{ font-size:1.9rem; }
    .nombre{ font-size:2.3rem; }
    .divider img{
        width:60%;
        max-width:260px;
    }
}
</style>
</head>

<body>

<div class="card">

    <!-- ✨ divisor superior -->
    <div class="divider">
        <img src="divisor 1.png" alt="decoración">
    </div>

    <div class="text">
        <p class="nombre">Sofía,</p>

        <p>
            En todo lo bonito,<br>
            siempre estás tú.
        </p>

        <p>
            No sé explicarlo,<br>
            pero me encantas.
        </p>

        <p>
            Te quiero mucho. <span class="heart"></span>
        </p>
    </div>

    <!-- ✨ divisor inferior -->
    <div class="divider">
        <img src="divisor 2.png" alt="decoración">
    </div>

</div>

</body>
</html>
